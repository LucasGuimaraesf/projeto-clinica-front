<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Consultas - Clínica Geral</title>

    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body class="app-body">
    <!-- HEADER simples do paciente -->
    <header class="topbar" style="position: static; left: 0;">
      <div class="logo-area" style="gap: 12px;">
        <img
          src="https://i.pinimg.com/736x/72/08/e2/7208e2eb967adc9b101574e29d59256b.jpg"
          alt="Logo"
          style="width: 42px; height: 42px; border-radius: 50%; object-fit: cover;"
        />
        <strong style="color: var(--texto);">Clínica Geral</strong>
      </div>
      <div class="topbar-actions">
        <span class="topbar-user"><i class="fa-solid fa-circle-user"></i> Olá, Lucas</span>
        <a href="login.html" class="btn-novo" style="text-decoration: none;">
          <i class="fa-solid fa-right-from-bracket"></i> <span>Sair</span>
        </a>
      </div>
    </header>

    <main class="portal-main">
      <div class="portal-header">
        <div>
          <h1 class="main-title">Minhas Consultas</h1>
          <p class="main-sub" style="margin: 0;">Acompanhe e marque seus atendimentos</p>
        </div>
        <button class="btn-novo" data-bs-toggle="modal" data-bs-target="#modalMarcar">
          <i class="fa-solid fa-plus"></i> <span>Marcar Consulta</span>
        </button>
      </div>

      <h3 style="color: var(--texto); margin-bottom: 15px;">Próximas</h3>
      <div class="consulta-lista" id="listaConsultas"></div>
    </main>

    <!-- MODAL: MARCAR CONSULTA -->
    <div class="modal fade" id="modalMarcar" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px;">
          <div class="modal-header">
            <h5 class="modal-title">Marcar Consulta</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <form onsubmit="return marcarConsulta(event)">
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label" for="mEspecialidade">Especialidade</label>
                <select class="form-select" id="mEspecialidade" required>
                  <option value="">Selecione...</option>
                  <option>Cardiologia</option>
                  <option>Pediatria</option>
                  <option>Clínica Geral</option>
                  <option>Check-up</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label" for="mMedico">Médico</label>
                <select class="form-select" id="mMedico" required>
                  <option value="">Selecione...</option>
                  <option>Dr. Carlos Silva</option>
                  <option>Dra. Ana Souza</option>
                  <option>Dr. Ricardo Lima</option>
                  <option>Dra. Marina Costa</option>
                </select>
              </div>
              <div class="row">
                <div class="col mb-3">
                  <label class="form-label" for="mData">Data</label>
                  <input type="date" class="form-control" id="mData" required />
                </div>
                <div class="col mb-3">
                  <label class="form-label" for="mHora">Horário</label>
                  <input type="time" class="form-control" id="mHora" required />
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn-novo">Confirmar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const STATUS_LABEL = {
        confirmado: "Confirmado",
        espera: "Em espera",
        cancelado: "Cancelado",
      };

      // Consultas do paciente logado (mock)
      const minhasConsultas = [
        { dia: "24", mes: "Jun", titulo: "Cardiologia", medico: "Dr. Carlos Silva", hora: "08:00", sala: "Sala 1", status: "confirmado" },
        { dia: "02", mes: "Jul", titulo: "Check-up", medico: "Dra. Marina Costa", hora: "10:30", sala: "Sala 4", status: "espera" },
        { dia: "15", mes: "Jul", titulo: "Clínica Geral", medico: "Dr. Ricardo Lima", hora: "14:00", sala: "Sala 3", status: "confirmado" },
      ];

      function mudarStatusPaciente(indice, novo) {
        minhasConsultas[indice].status = novo;
        renderMinhas();
      }

      function renderMinhas() {
        const box = document.getElementById("listaConsultas");
        if (minhasConsultas.length === 0) {
          box.innerHTML =
            '<div class="estado-vazio"><i class="fa-solid fa-calendar-xmark"></i><p>Você ainda não tem consultas marcadas.</p></div>';
          return;
        }
        box.innerHTML = minhasConsultas
          .map((c, i) => {
            const cancelada = c.status === "cancelado";
            const acoes = cancelada
              ? ""
              : `<div style="display:flex; gap:8px; margin-top:10px;">
                   ${c.status !== "confirmado"
                     ? `<button class="btn btn-sm btn-success" onclick="mudarStatusPaciente(${i}, 'confirmado')"><i class="fa-solid fa-check"></i> Confirmar</button>`
                     : ""}
                   <button class="btn btn-sm btn-outline-danger" onclick="mudarStatusPaciente(${i}, 'cancelado')"><i class="fa-solid fa-xmark"></i> Cancelar</button>
                 </div>`;
            return `
          <div class="consulta-linha anima" style="${cancelada ? "opacity:0.6;" : ""}">
            <div class="data-box">
              <div class="dia">${c.dia}</div>
              <div class="mes">${c.mes}</div>
            </div>
            <div class="detalhe">
              <h4>${c.titulo}</h4>
              <p><i class="fa-solid fa-user-doctor"></i> ${c.medico} &nbsp;·&nbsp;
                 <i class="fa-solid fa-clock"></i> ${c.hora} &nbsp;·&nbsp;
                 <i class="fa-solid fa-door-open"></i> ${c.sala}</p>
              ${acoes}
            </div>
            <span class="badge-status status-${c.status}">${STATUS_LABEL[c.status]}</span>
          </div>`;
          })
          .join("");
      }

      function marcarConsulta(e) {
        e.preventDefault();
        const esp = document.getElementById("mEspecialidade").value;
        const med = document.getElementById("mMedico").value;
        const data = document.getElementById("mData").value;
        const hora = document.getElementById("mHora").value;
        const d = new Date(data + "T00:00:00");
        const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];

        minhasConsultas.push({
          dia: String(d.getDate()).padStart(2, "0"),
          mes: meses[d.getMonth()],
          titulo: esp,
          medico: med,
          hora: hora,
          sala: "A confirmar",
          status: "espera",
        });

        renderMinhas();
        bootstrap.Modal.getInstance(document.getElementById("modalMarcar")).hide();
        e.target.reset();
        return false;
      }

      document.addEventListener("DOMContentLoaded", renderMinhas);
    </script>
  </body>
</html>
